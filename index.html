<style>
:root{--blue:#00aeef;--line:#d8e2ef;--soft:#f5fbff;--text:#1f2937;--muted:#6b7280;--panel:672px}
*{box-sizing:border-box}html,body{margin:0;padding:0;width:100%;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Meiryo,sans-serif;color:var(--text);background:#fff;font-size:14px;overscroll-behavior:none}
body{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
button,input,select{font:inherit}.hide{display:none!important}
.app{display:grid;grid-template-columns:var(--panel) 1fr;gap:12px;padding:10px;min-height:100vh}.panel,.previewWrap{min-width:0}.panel{border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:0 1px 3px #0001;overflow:auto;max-height:calc(100vh - 20px)}
.head{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);font-weight:800;position:sticky;top:0;background:#fff;z-index:10}.head img{width:32px;height:32px;border-radius:7px}.title{font-size:22px;white-space:nowrap}.ver{font-size:12px;color:var(--muted);font-weight:600;margin-left:auto;white-space:nowrap}.ratioCtl{display:flex;align-items:center;gap:6px;margin-left:8px;white-space:nowrap}.ratioCtl select{padding:5px 8px;border:1px solid #cbd5e1;border-radius:5px;background:#fff}
.section{border-bottom:1px solid #e5e7eb;padding:12px 14px;display:grid;grid-template-columns:122px 1fr;gap:8px 12px;align-items:center}.section h2{grid-column:1/-1;margin:0 0 4px;font-size:16px;border-bottom:1px solid #e5e7eb;padding-bottom:7px}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.radios label{display:block;margin:5px 0}label{white-space:nowrap}.num{width:78px;padding:5px 6px;border:1px solid #d1d5db;border-radius:4px;text-align:right}.stepper{display:inline-flex;align-items:center;gap:8px;vertical-align:middle}.stepLine{display:grid;grid-template-columns:54px auto;align-items:center;gap:8px;margin:7px 0}.posMode{margin:8px 0 4px}.stepBtn{width:34px;height:32px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;font-size:20px;font-weight:900;line-height:1;cursor:pointer;touch-action:manipulation}.stepVal{display:inline-flex;align-items:center;justify-content:center;min-width:54px;height:32px;border:1px solid #d1d5db;border-radius:6px;background:#f8fafc;font-weight:800}.ampm{font-size:.5em;vertical-align:baseline;margin-right:.18em}.fontsel,.colorsel{width:180px;padding:5px;border:1px solid #d1d5db;border-radius:4px;background:#fff}.colorsel{padding-left:34px;background-repeat:no-repeat;background-position:8px center;background-size:18px 18px}.colorPalette{display:grid;grid-template-columns:repeat(8,28px);gap:6px;align-items:center}.colorBtn{width:28px;height:28px;border-radius:6px;border:2px solid #cbd5e1;cursor:pointer;padding:0;background:#fff}.colorBtn.on{border-color:#111;box-shadow:0 0 0 2px #fff,0 0 0 4px #111}.sw{width:28px;height:28px;border-radius:5px;border:1px solid #cbd5e1}.muted{color:var(--muted);font-size:12px}.actions{padding:10px 14px;display:flex;gap:10px;align-items:center}.btn{border:1px solid #cbd5e1;border-radius:5px;background:#fff;padding:7px 18px;cursor:pointer}.btn.danger{background:#fff;color:#b91c1c;border-color:#fecaca}.previewWrap{display:grid;grid-template-rows:auto auto auto auto;gap:8px;min-height:0}.bar{border:1px solid #bcd7f7;background:#f1f8ff;color:#0874d1;font-weight:800;border-radius:5px 5px 0 0;padding:10px 14px;font-size:18px}.bar small{color:#555;font-size:13px;font-weight:500}.greenbar{border:1px solid #b7e4c7;background:#ecfff0;color:#15803d;font-weight:800;padding:10px 14px;border-radius:5px 5px 0 0}.stage{border:2px solid #111;position:relative;background:#fff;aspect-ratio:4/3;width:10.7cm;height:8cm;max-width:100%;overflow:hidden;cursor:pointer;user-select:none;-webkit-user-select:none}.stage.saved{background:#000}.stage.ratio19{aspect-ratio:19/9;width:min(100%,10.7cm);height:auto}.item{position:absolute;line-height:1;white-space:nowrap;font-weight:900}.analogCanvas{position:absolute;inset:0;width:100%;height:100%;display:none}.fullText{display:none}.fs{position:fixed!important;left:50%!important;top:50%!important;max-width:none!important;z-index:9999!important;border:none!important;transform:translate(-50%,-50%)!important;user-select:none;-webkit-user-select:none;touch-action:none;cursor:default}.fs.r43{width:min(100vw,calc(100vh * 4 / 3))!important;height:min(100vh,calc(100vw * 3 / 4))!important}.fs.r19{width:min(100vw,calc(100vh * 19 / 9))!important;height:min(100vh,calc(100vw * 9 / 19))!important}.fs.whiteFull{background:#fff!important;box-shadow:0 0 0 9999px #fff!important}.fs.blackFull{background:#000!important;box-shadow:0 0 0 9999px #000!important}.phoneTop{display:none}.phoneSticky{display:none}
body.layout19{overflow-y:auto}body.layout19 .app{display:block;padding:0;min-height:100vh}body.layout19 .panel{border:0;border-radius:0;box-shadow:none;max-height:none;overflow:visible;max-width:520px;margin:0 auto;background:#fff}body.layout19 .head{padding:8px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}body.layout19 .title{font-size:18px}body.layout19 .ver{font-size:11px;margin-left:0}body.layout19 .ratioCtl span{display:none}body.layout19 .phoneSticky{display:block;position:fixed;top:49px;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#fff;z-index:25;padding:8px 10px;border-bottom:1px solid var(--line);box-shadow:0 2px 4px #0001}body.layout19 .phoneSticky .stage{width:100%;height:auto}body.layout19 #settings{padding-top:calc((min(100vw,520px) - 20px) * 9 / 19 + 72px)}body.layout19 .previewWrap{display:block;position:absolute;left:0;top:0;width:0;height:0;overflow:visible}body.layout19 .previewWrap>.bar,body.layout19 .previewWrap>.greenbar,body.layout19 .previewWrap>#liveStage,body.layout19 .previewWrap>.actions{display:none!important}body.layout19 #savedStage:not(.fs){display:none!important}body.layout19 .section{grid-template-columns:110px 1fr;padding:10px 12px}body.layout19 .section h2{font-size:15px}body.layout19 .actions{padding:10px 12px}body.layout19 .fontsel,body.layout19 .colorsel{width:160px}body.layout19 .colorPalette{grid-template-columns:repeat(8,28px)}
@media(max-width:1000px){body:not(.layout19) .app{grid-template-columns:1fr}body:not(.layout19) .panel{max-height:none}body:not(.layout19) .stage{width:min(10.7cm,100%);height:auto}}
</style>

<body>
<div class="app">
  <div class="panel">
    <div class="head">
      <img src="icon-192.png" alt="">
      <div class="title">ちょこっと時計</div>
      <div class="ratioCtl"><span>比率切替</span><select id="ratioSel"><option value="4:3">4:3</option><option value="19:9">19:9</option></select></div>
      <div class="ver">Ver.260619-0215 PWA</div>
    </div>
    <div class="phoneSticky"><div class="stage ratio19" id="phoneStage"><canvas id="phoneAnalog" class="analogCanvas"></canvas><div id="phoneTime" class="item"></div><div id="phoneDate" class="item"></div></div></div>
    <div id="settings"></div>
    <div class="actions"><button class="btn danger" id="resetBtn">初期値に戻す</button><span class="muted">変更は自動保存。表示をタップでフル表示、左右スワイプで表示切替、2秒長押しで設定へ戻ります。</span></div>
  </div>
  <div class="previewWrap">
    <div class="bar">リアルタイム表示 <small>（設定を変更すると即時反映）</small></div>
    <div class="stage" id="liveStage"><canvas id="liveAnalog" class="analogCanvas"></canvas><div id="liveTime" class="item"></div><div id="liveDate" class="item"></div></div>
    <div class="greenbar">フル表示プレビュー <small>（リアル表示・設定変更を即時反映）</small></div>
    <div class="stage saved" id="savedStage"><canvas id="savedAnalog" class="analogCanvas"></canvas><div id="savedTime" class="item"></div><div id="savedDate" class="item"></div></div>
  </div>
</div>
<script>
(function(){
var VER='260619-0215';
var colors=[['#00AEEF','水色'],['#5FD3DF','薄水色'],['#B065E8','紫'],['#E85CCB','ピンク紫'],['#F26D91','ピンク'],['#FF4C5E','赤'],['#FF633D','朱色'],['#FFB45C','オレンジ'],['#55D98C','薄緑'],['#55C878','緑'],['#58B947','濃緑'],['#A6DB45','黄緑'],['#5EA4F5','青'],['#5D6DF2','藍'],['#7D55E8','青紫'],['#7A8A93','グレー']];
var fonts=['Comic Sans MS','Arial Black','Arial','Verdana','Georgia','Times New Roman','Meiryo','Yu Gothic','Courier New'];
var def={ratio:'4:3',time:{fmt:'hm',ampm:'24',analogTime:'on',color:'#00AEEF',size:117,pos:'tl',top:57,left:36,topc:57,font:'Comic Sans MS'},date:{fmt:'ymd',weekFmt:'enShort',color:'#00AEEF',size:33,pos:'tl',top:222,left:55,topc:222,font:'Comic Sans MS'}};
var STORE='chokottoClock_v260619_0200';
function clone(o){return JSON.parse(JSON.stringify(o))}
function load(){try{var v=localStorage.getItem(STORE);if(v)return Object.assign(clone(def),JSON.parse(v));var old0135=localStorage.getItem('chokottoClock_v260619_0135');if(old0135){return Object.assign(clone(def),JSON.parse(old0135))}var old0125=localStorage.getItem('chokottoClock_v260619_0125');if(old0125){return Object.assign(clone(def),JSON.parse(old0125))}var old=localStorage.getItem('chokottoClockDraft_v260618_2335');if(old){var o=JSON.parse(old),n=clone(def);if(o.time){n.time.fmt=o.time.fmt||n.time.fmt;n.time.ampm=o.time.ampm||n.time.ampm;n.time.analogTime=o.time.analogTime||'on';n.time.color=o.time.color||n.time.color;n.time.size=Number(o.time.h)||n.time.size;n.time.pos=o.time.pos||n.time.pos;n.time.top=Number(o.time.top)||n.time.top;n.time.left=Number(o.time.left)||n.time.left;n.time.topc=Number(o.time.topc)||n.time.topc;n.time.font=o.time.font||n.time.font}if(o.date){n.date.fmt=o.date.fmt||n.date.fmt;n.date.color=o.date.color||n.date.color;n.date.size=Number(o.date.h)||n.date.size;n.date.pos=o.date.pos||n.date.pos;n.date.top=Number(o.date.top)||n.date.top;n.date.left=Number(o.date.left)||n.date.left;n.date.topc=Number(o.date.topc)||n.date.topc;n.date.font=o.date.font||n.date.font}if(o.week){n.date.weekFmt=o.week.fmt||n.date.weekFmt}return n}}catch(e){}return clone(def)}
var state=load(), fullMode='blackDigital', modes=['whiteDigital','blackDigital','whiteAnalog','blackAnalog'];
function save(){try{localStorage.setItem(STORE,JSON.stringify(state))}catch(e){}}
function pad(n){return ('0'+n).slice(-2)}
function fmtTime(d,c){var h=d.getHours(),m=pad(d.getMinutes()),s=pad(d.getSeconds()),ap='';if(c.ampm==='12'){ap=h<12?'AM':'PM';h=h%12||12;return ap+' '+pad(h)+':'+m+(c.fmt==='hms'?':'+s:'')}return pad(h)+':'+m+(c.fmt==='hms'?':'+s:'')}
function fmtTimeHtml(d,c){var v=fmtTime(d,c);if(c.ampm==='12'){var i=v.indexOf(' ');return '<span class="ampm">'+v.slice(0,i)+'</span>'+v.slice(i+1)}return v}
function fmtDate(d,c){var y=d.getFullYear(),yy=String(y).slice(-2),mo=pad(d.getMonth()+1),da=pad(d.getDate());var base=c.fmt==='yy'?yy+'/'+mo+'/'+da:c.fmt==='md'?mo+'/'+da:y+'/'+mo+'/'+da;var w=fmtWeek(d,c.weekFmt);return w?base+' '+w:base}
function fmtWeek(d,f){var enS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],enF=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],jaS=['日','月','火','水','木','金','土'],jaF=['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];var i=d.getDay(),v='';if(f==='none')return '';if(f==='enFull')v=enF[i];else if(f==='jaShort')v=jaS[i];else if(f==='jaFull')v=jaF[i];else v=enS[i];return '('+v+')'}
function radio(name,val,txt,cur){return '<label><input type="radio" name="'+name+'" value="'+val+'" '+(cur===val?'checked':'')+'> '+txt+'</label>'}
function colorSelect(key,cur){var h='<div class="colorPalette" role="group" aria-label="色選択">';colors.forEach(function(c){var on=c[0].toUpperCase()===cur.toUpperCase();h+='<button type="button" class="colorBtn '+(on?'on':'')+'" data-k="'+key+'" data-p="color" data-color="'+c[0]+'" title="'+c[1]+'" aria-label="'+c[1]+'" style="background:'+c[0]+'"></button>'});return h+'</div>'}
function stepper(key,prop,val,step,min,max){return '<span class="stepper" data-k="'+key+'" data-p="'+prop+'" data-step="'+(step||1)+'" data-min="'+(min==null?'':min)+'" data-max="'+(max==null?'':max)+'"><button type="button" class="stepBtn minus">−</button><span class="stepVal">'+val+'</span><button type="button" class="stepBtn plus">＋</button></span>'}
function fontSelect(key,cur){var h='<select class="fontsel" data-k="'+key+'" data-p="font">';fonts.forEach(function(f){h+='<option '+(cur===f?'selected':'')+'>'+f+'</option>'});return h+'</select>'}
function posBlock(key,c){return '<div>位置</div><div class="radios"><div class="posMode">'+radio(key+'.pos','tl','Top / Left 指定',c.pos)+'</div><div class="stepLine"><span>Top</span>'+stepper(key,'top',c.top,1,0,999)+'</div><div class="stepLine"><span>Left</span>'+stepper(key,'left',c.left,1,0,999)+'</div><div class="posMode">'+radio(key+'.pos','center','Top 指定センタリング',c.pos)+'</div><div class="stepLine"><span>Top</span>'+stepper(key,'topc',c.topc,1,0,999)+'</div></div>'}
function buildSettings(){var t=state.time,d=state.date;var html='';
html+='<div class="section"><h2>1. 時刻表示の設定</h2><div>時刻表示形式</div><div class="radios">'+radio('time.fmt','hm','HH:MM',t.fmt)+radio('time.fmt','hms','HH:MM:SS',t.fmt)+'</div><div>時間制</div><div class="radios">'+radio('time.ampm','24','24時間',t.ampm)+radio('time.ampm','12','12時間（AM/PM）',t.ampm)+'</div><div>アナログ時計表記</div><div class="radios">'+radio('time.analogTime','on','表示',t.analogTime)+radio('time.analogTime','off','非表示',t.analogTime)+'</div><div>時刻色</div><div class="row">'+colorSelect('time',t.color)+'</div><div>サイズ</div><div class="stepLine"><span>Size</span>'+stepper('time','size',t.size,1,10,300)+'</div>'+posBlock('time',t)+'<div>フォント</div><div>'+fontSelect('time',t.font)+'</div></div>';
html+='<div class="section"><h2>2. 日付・曜日表示の設定</h2><div>日付形式</div><div class="radios">'+radio('date.fmt','ymd','yyyy/mm/dd',d.fmt)+radio('date.fmt','yy','yy/mm/dd',d.fmt)+radio('date.fmt','md','mm/dd',d.fmt)+'</div><div>曜日形式</div><div class="radios">'+radio('date.weekFmt','enShort','英語短縮　(Mon)',d.weekFmt)+radio('date.weekFmt','enFull','英語フル　(Monday)',d.weekFmt)+radio('date.weekFmt','jaShort','日本語短縮　(月)',d.weekFmt)+radio('date.weekFmt','jaFull','日本語フル　(月曜日)',d.weekFmt)+radio('date.weekFmt','none','非表示',d.weekFmt)+'</div><div>日付色</div><div class="row">'+colorSelect('date',d.color)+'</div><div>サイズ</div><div class="stepLine"><span>Size</span>'+stepper('date','size',d.size,1,10,200)+'</div>'+posBlock('date',d)+'<div>フォント</div><div>'+fontSelect('date',d.font)+'</div></div>';
html+='<div class="section"><h2>3. 表示設定</h2><div>比率</div><div><select class="fontsel" id="ratioSel2"><option value="4:3" '+(state.ratio==='4:3'?'selected':'')+'>4:3（iPad）</option><option value="19:9" '+(state.ratio==='19:9'?'selected':'')+'>19:9（スマホ）</option></select></div></div>';
document.getElementById('settings').innerHTML=html;bind();}
function bind(){document.querySelectorAll('input,select').forEach(function(el){el.oninput=el.onchange=function(){if(el.id==='ratioSel'||el.id==='ratioSel2'){state.ratio=el.value;save();applyLayout();renderAll();return}var n=el.name;if(n){var a=n.split('.');state[a[0]][a[1]]=el.value}else{var k=el.dataset.k,p=el.dataset.p;if(!k)return;state[k][p]=(el.type==='number')?Number(el.value):el.value}save();applyLayout();renderAll();}});document.querySelectorAll('.colorBtn').forEach(function(btn){btn.onclick=function(){var k=btn.dataset.k,p=btn.dataset.p;if(!k)return;state[k][p]=btn.dataset.color;save();buildSettings();applyLayout();renderAll();}});document.querySelectorAll('.stepper').forEach(function(sp){var timer=null;function stop(){if(timer){clearInterval(timer);timer=null}}function change(dir){var k=sp.dataset.k,p=sp.dataset.p,step=Number(sp.dataset.step||1),min=sp.dataset.min===''?null:Number(sp.dataset.min),max=sp.dataset.max===''?null:Number(sp.dataset.max);var v=Number(state[k][p]||0)+dir*step;if(min!==null&&v<min)v=min;if(max!==null&&v>max)v=max;state[k][p]=v;var sv=sp.querySelector('.stepVal');if(sv)sv.textContent=v;save();applyLayout();renderAll()}function arm(btn,dir){btn.addEventListener('click',function(e){e.preventDefault();change(dir)});btn.addEventListener('mousedown',function(e){e.preventDefault();stop();timer=setInterval(function(){change(dir)},160)});btn.addEventListener('touchstart',function(e){e.preventDefault();stop();timer=setInterval(function(){change(dir)},160)},{passive:false});['mouseup','mouseleave','touchend','touchcancel'].forEach(function(ev){btn.addEventListener(ev,stop)})}var m=sp.querySelector('.minus'),pl=sp.querySelector('.plus');if(m)arm(m,-1);if(pl)arm(pl,1)})}function applyLayout(){document.body.classList.toggle('layout19',state.ratio==='19:9');document.querySelectorAll('#ratioSel,#ratioSel2').forEach(function(s){if(s)s.value=state.ratio});['liveStage','savedStage','phoneStage'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.toggle('ratio19',state.ratio==='19:9')});if(state.ratio==='19:9'){var ps=document.querySelector('.phoneSticky');if(ps){ps.style.display='block';ps.style.position='fixed';ps.style.top='49px';ps.style.left='50%';ps.style.transform='translateX(-50%)';ps.style.zIndex='25'}}}
function baseScale(stage){var ref=state.ratio==='19:9'?404:404;return (stage.getBoundingClientRect().width||ref)/ref}
function place(el,c,stage){var sc=baseScale(stage);el.style.color=c.color;el.style.fontFamily=c.font;el.style.fontSize=Math.max(10,(Number(c.size)||50)*sc)+'px';el.style.width='auto';el.style.height='auto';el.style.top=(((c.pos==='center'?c.topc:c.top)||0)*sc)+'px';if(c.pos==='center'){el.style.left='50%';el.style.transform='translateX(-50%)';el.style.textAlign='center'}else{el.style.left=((c.left||0)*sc)+'px';el.style.transform='none';el.style.textAlign='left'}}
function renderDigital(prefix,stage,whiteBg){var d=new Date(),t=document.getElementById(prefix+'Time'),da=document.getElementById(prefix+'Date'),can=document.getElementById(prefix+'Analog');if(!t||!da)return;if(can)can.style.display='none';t.style.display='block';da.style.display='block';t.innerHTML=fmtTimeHtml(d,state.time);da.textContent=fmtDate(d,state.date);place(t,state.time,stage);place(da,state.date,stage);stage.style.background=whiteBg?'#fff':'#000'}
function renderAll(){applyLayout();renderDigital('live',document.getElementById('liveStage'),true);renderDigital('phone',document.getElementById('phoneStage'),true);var ss=document.getElementById('savedStage');if(isAnalog(fullMode)){drawAnalog('saved',ss,modeBg(fullMode)==='white')}else{renderDigital('saved',ss,modeBg(fullMode)==='white')}}
function modeBg(m){return m.indexOf('white')===0?'white':'black'}function isAnalog(m){return m.indexOf('Analog')>0}
function setStageDigital(prefix,on){['Time','Date'].forEach(function(x){var e=document.getElementById(prefix+x);if(e)e.style.display=on?'block':'none'});var c=document.getElementById(prefix+'Analog');if(c)c.style.display=on?'none':'block'}
function openFull(mode){fullMode=mode||fullMode||'blackDigital';var s=document.getElementById('savedStage');s.classList.remove('r43','r19','whiteFull','blackFull');s.classList.add('fs',state.ratio==='19:9'?'r19':'r43',modeBg(fullMode)==='white'?'whiteFull':'blackFull');document.body.style.overflow='hidden';if(isAnalog(fullMode)){drawAnalog('saved',s,modeBg(fullMode)==='white')}else{setStageDigital('saved',true);renderDigital('saved',s,modeBg(fullMode)==='white')}}
function closeFull(){var s=document.getElementById('savedStage');s.classList.remove('fs','r43','r19','whiteFull','blackFull');document.body.style.overflow='';setStageDigital('saved',true);clearHold();renderAll()}
function drawAnalog(prefix,stage,white){var canvas=document.getElementById(prefix+'Analog');if(!canvas)return;setStageDigital(prefix,false);canvas.style.display='block';var rect=stage.getBoundingClientRect(),d=new Date(),dpr=window.devicePixelRatio||1;canvas.width=Math.max(1,Math.floor(rect.width*dpr));canvas.height=Math.max(1,Math.floor(rect.height*dpr));canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';var ctx=canvas.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);var W=rect.width,H=rect.height;ctx.fillStyle=white?'#fff':'#000';ctx.fillRect(0,0,W,H);var col=white?'#000':'#fff';var cx=W/2,cy=H/2,r=Math.min(W,H)*0.43;ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=Math.max(3,r*0.01);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();for(var i=0;i<60;i++){var a=i*Math.PI/30-Math.PI/2,major=i%5===0,len=major?r*.095:r*.045,w=major?Math.max(3,r*.012):Math.max(2,r*.006);ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*(r-len),cy+Math.sin(a)*(r-len));ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.stroke()}ctx.font='900 '+Math.floor(r*.16)+'px Arial Black,Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';for(var n=1;n<=12;n++){var a=n*Math.PI/6-Math.PI/2;ctx.fillText(String(n),cx+Math.cos(a)*r*.78,cy+Math.sin(a)*r*.78)}var hr=d.getHours()%12+d.getMinutes()/60,mn=d.getMinutes()+d.getSeconds()/60,sc=d.getSeconds();function hand(angle,len,width,color){ctx.strokeStyle=color||col;ctx.lineWidth=width;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(angle-Math.PI/2)*len,cy+Math.sin(angle-Math.PI/2)*len);ctx.stroke()}hand(hr*Math.PI/6,r*.52,Math.max(10,r*.055),col);hand(mn*Math.PI/30,r*.70,Math.max(8,r*.045),col);hand(sc*Math.PI/30,r*.78,Math.max(2,r*.006),col);ctx.fillStyle=white?'#ddd':'#222';ctx.beginPath();ctx.arc(cx,cy,r*.035,0,Math.PI*2);ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=Math.max(2,r*.008);ctx.stroke();function frontText(txt,y,size,font,color){if(!txt)return;ctx.font='900 '+Math.floor(size)+'px '+(font||'Arial')+',Arial,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.lineWidth=Math.max(4,r*.025);ctx.strokeStyle=white?'#fff':'#000';ctx.strokeText(txt,cx,y);ctx.fillStyle=color||col;ctx.fillText(txt,cx,y)}if(state.time.analogTime==='on'){var at=fmtTime(d,state.time);if(state.time.ampm==='12'&&at.indexOf(' ')>0){var ap=at.split(' ')[0],tm=at.split(' ')[1];ctx.font='900 '+Math.floor(r*.12)+'px '+state.time.font+',Arial,sans-serif';var tw=ctx.measureText(tm).width;ctx.font='900 '+Math.floor(r*.06)+'px '+state.time.font+',Arial,sans-serif';var aw=ctx.measureText(ap).width;var sx=cx-(tw+aw+r*.025)/2;ctx.textAlign='left';ctx.textBaseline='middle';ctx.lineWidth=Math.max(4,r*.025);ctx.strokeStyle=white?'#fff':'#000';ctx.fillStyle=col;ctx.font='900 '+Math.floor(r*.06)+'px '+state.time.font+',Arial,sans-serif';ctx.strokeText(ap,sx,cy-r*.23);ctx.fillText(ap,sx,cy-r*.23);ctx.font='900 '+Math.floor(r*.12)+'px '+state.time.font+',Arial,sans-serif';ctx.strokeText(tm,sx+aw+r*.025,cy-r*.23);ctx.fillText(tm,sx+aw+r*.025,cy-r*.23)}else{frontText(at,cy-r*.23,r*.12,state.time.font,col)}}frontText(fmtDate(d,state.date),cy+r*.34,r*.075,state.date.font,col)}
var holdTimer=null,suppressClick=false,touchSX=0,touchSY=0,touchST=0,mouseSX=0,mouseSY=0,mouseDown=false;function clearHold(){if(holdTimer){clearTimeout(holdTimer);holdTimer=null}}function startHold(e){var s=document.getElementById('savedStage');if(!s.classList.contains('fs'))return;if(e&&e.preventDefault)e.preventDefault();clearHold();holdTimer=setTimeout(function(){suppressClick=true;closeFull();setTimeout(function(){suppressClick=false},350)},2000)}function nextFullMode(){var i=modes.indexOf(fullMode);if(i<0)i=0;openFull(modes[(i+1)%modes.length])}function prevFullMode(){var i=modes.indexOf(fullMode);if(i<0)i=0;openFull(modes[(i-1+modes.length)%modes.length])}function judgeSwipe(dx,dy,dt){if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.7&&dt<1200){dx<0?nextFullMode():prevFullMode();return true}return false}
document.getElementById('liveStage').onclick=function(){openFull('whiteDigital')};var phoneTapMoved=false,phoneTapSX=0,phoneTapSY=0;function openPhoneFull(e){if(e&&e.preventDefault)e.preventDefault();openFull('whiteDigital')}var pst=document.getElementById('phoneStage');pst.onclick=function(){openFull('whiteDigital')};pst.addEventListener('touchstart',function(e){phoneTapMoved=false;if(e.touches&&e.touches.length){phoneTapSX=e.touches[0].clientX;phoneTapSY=e.touches[0].clientY}},{passive:true});pst.addEventListener('touchmove',function(e){if(e.touches&&e.touches.length){var dx=e.touches[0].clientX-phoneTapSX,dy=e.touches[0].clientY-phoneTapSY;if(Math.abs(dx)>12||Math.abs(dy)>12)phoneTapMoved=true}},{passive:true});pst.addEventListener('touchend',function(e){if(!phoneTapMoved)openPhoneFull(e)},{passive:false});document.getElementById('savedStage').onclick=function(){if(suppressClick)return;if(!this.classList.contains('fs'))openFull(fullMode||'blackDigital')};
var fs=document.getElementById('savedStage');fs.addEventListener('touchstart',function(e){if(fs.classList.contains('fs')&&e.touches&&e.touches.length){touchSX=e.touches[0].clientX;touchSY=e.touches[0].clientY;touchST=Date.now()}startHold(e)},{passive:false});fs.addEventListener('touchmove',function(e){if(!fs.classList.contains('fs')||!e.touches||!e.touches.length)return;var dx=e.touches[0].clientX-touchSX,dy=e.touches[0].clientY-touchSY;if(Math.abs(dx)>18||Math.abs(dy)>18)clearHold()},{passive:false});fs.addEventListener('touchend',function(e){clearHold();if(!fs.classList.contains('fs'))return;if(e.changedTouches&&e.changedTouches.length){var dx=e.changedTouches[0].clientX-touchSX,dy=e.changedTouches[0].clientY-touchSY;if(judgeSwipe(dx,dy,Date.now()-touchST))e.preventDefault()}},{passive:false});fs.addEventListener('mousedown',function(e){mouseDown=true;mouseSX=e.clientX;mouseSY=e.clientY;startHold(e)});fs.addEventListener('mouseup',function(e){clearHold();if(fs.classList.contains('fs')&&mouseDown)judgeSwipe(e.clientX-mouseSX,e.clientY-mouseSY,600);mouseDown=false});fs.addEventListener('mouseleave',function(){clearHold();mouseDown=false});fs.addEventListener('touchcancel',clearHold);fs.addEventListener('contextmenu',function(e){if(fs.classList.contains('fs'))e.preventDefault()});document.addEventListener('keydown',function(e){if(e.key==='Escape')closeFull()});
